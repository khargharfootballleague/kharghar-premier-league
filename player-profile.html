<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile | KPL Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#f8fafc] text-gray-900">

    <header class="relative bg-[#0D1B3E] pt-20 pb-32 overflow-hidden">
        <div class="absolute top-0 right-0 w-1/2 h-full bg-[#2D9F94] skew-x-[-20deg] translate-x-32 opacity-20"></div>
        
        <div class="max-w-6xl mx-auto px-6 relative z-10">
            <div class="flex flex-col md:flex-row items-center gap-12">
                <div class="relative group">
                    <div class="absolute -inset-2 bg-gradient-to-tr from-yellow-500 to-[#2D9F94] rounded-[3rem] blur opacity-30 group-hover:opacity-60 transition duration-1000"></div>
                    <div class="relative h-64 w-64 md:h-80 md:w-80 rounded-[3rem] bg-gray-800 border-4 border-white/10 overflow-hidden shadow-2xl">
                        <img src="player-akhil.jpg" alt="Player Name" class="h-full w-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=Player+Name&background=0D1B3E&color=fff&size=512';">
                    </div>
                    <div class="absolute -bottom-4 -right-4 bg-yellow-500 text-black font-black px-6 py-2 rounded-2xl rotate-3 shadow-xl uppercase italic text-sm border-2 border-white">
                        KPL Legend
                    </div>
                </div>

                <div class="text-center md:text-left text-white">
                    <div class="flex items-center justify-center md:justify-start gap-3 mb-4">
                        <span class="bg-white/10 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-white/10">Season 2 Best Player</span>
                    </div>
                    <h1 class="text-5xl md:text-8xl font-black italic uppercase tracking-tighter leading-none mb-4">
                        Akhil <br><span class="text-[#2D9F94]">Nair</span>
                    </h1>
                    <div class="flex flex-wrap justify-center md:justify-start gap-6">
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Nationality</p>
                            <p class="font-bold flex items-center gap-2">🇮🇳 Indian</p>
                        </div>
                        <div class="w-px h-10 bg-white/10"></div>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Current Club</p>
                            <p class="font-bold">Alpha Wolves United FC</p>
                        </div>
						<div class="w-px h-10 bg-white/10"></div>
						<div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Previous Clubs</p>
                            <p class="font-bold">Kharghar United FC</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 -mt-16
